<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Server Error — Medilo</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@48,400,0,0" />
</head>
<body class="error-page">
    <div class="aurora-container">
        <div class="aurora-orb aurora-orb-1"></div>
        <div class="aurora-orb aurora-orb-3"></div>
    </div>
    
    <div class="container error-content">
        <span class="material-symbols-rounded error-icon">report_problem</span>
        <h1>Something went wrong</h1>
        <p>Our team has been notified. Please try again in a few moments.</p>
        <a href="{{ url_for('index') }}" class="action-btn primary">
            <span class="material-symbols-rounded">refresh</span>
            Try Again
        </a>
    </div>
</body>
</html>
